name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    name: Validate PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check Conventional Commits format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          pattern='^(feat|fix|docs|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9._/-]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR 제목은 Conventional Commits 형식이어야 합니다."
            echo "예: feat: 공중 로비 추가"
            exit 1
          fi

  build-and-test:
    name: Build and test (Java 25)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Build and test
        run: ./gradlew --no-daemon clean build

      - name: Upload plugin jar
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: WildBattleRoyale-${{ github.sha }}
          path: build/libs/WildBattleRoyale-*.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-reports-${{ github.sha }}
          path: build/reports/tests/
          if-no-files-found: ignore
          retention-days: 14
