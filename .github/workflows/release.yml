name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare or publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout released tag
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Set up Java 25
        if: steps.release.outputs.release_created == 'true'
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        if: steps.release.outputs.release_created == 'true'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build release jar
        if: steps.release.outputs.release_created == 'true'
        run: ./gradlew --no-daemon clean build

      - name: Create SHA-256 checksums
        if: steps.release.outputs.release_created == 'true'
        working-directory: build/libs
        run: sha256sum WildBattleRoyale-*.jar > checksums.txt

      - name: Upload assets to GitHub Release
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: gh release upload "$RELEASE_TAG" build/libs/WildBattleRoyale-*.jar build/libs/checksums.txt --clobber
