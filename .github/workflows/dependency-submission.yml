name: Dependency Submission

on:
  push:
    branches: [main]
    paths:
      - "**/*.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dependency-submission-main
  cancel-in-progress: true

jobs:
  submit:
    name: Submit Gradle dependency graph
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6
